name: ulog-ci

# Intended layout: this workflow lives at the repository root when ulog is
# extracted into its own repo. While the sources still live nested inside
# the userver tree, GitHub does not pick up `ulog/.github/workflows/*.yml`
# — the file is dormant until the extraction lands.

on:
  push:
    branches: [ main, master ]
  pull_request: {}
  workflow_dispatch: {}

# Opt every job into the Node.js 24 runtime for its JavaScript actions
# (actions/checkout, actions/cache/*, actions/upload-artifact, …). Node
# 20 is deprecated and will be forced off by default on 2026-06-02.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-22.04
            cc: gcc
            cxx: g++
            build_type: Release
            cppstd: "17"
          - name: linux-clang
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
            build_type: Release
            cppstd: "17"
          - name: macos-clang
            # macos-13 was retired as a hosted runner label in Apr 2026.
            # Use `macos-14` (Sonoma / Apple Silicon).
            os: macos-14
            cc: clang
            cxx: clang++
            build_type: Release
            cppstd: "17"
          - name: windows-msvc
            os: windows-2022
            cc: cl
            cxx: cl
            build_type: Release
            cppstd: "17"
            # Windows-2022 runners ship the 1803+ SDK that provides
            # <afunix.h>, so we opt ulog's AF_UNIX sink into the matrix.
            afunix: "ON"
          # C++20 row: catches accidental C++17-only idioms before they
          # reach downstream userver integrations that build with -std=c++20.
          - name: linux-clang-cpp20
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
            build_type: Release
            cppstd: "20"
          # Sanitizer builds: Linux clang, RelWithDebInfo so reports carry
          # frames. Only ulog's own code is instrumented — Conan deps stay
          # stock, which is cheap and sufficient for catching bugs in
          # ulog's queue, sink, and hook paths (see docs/BACKLOG.md
          # "Sanitizer CI"). Benchmarks are disabled because moodycamel's
          # lock-free internals trigger TSan false positives that swamp
          # real findings.
          - name: linux-asan
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            cppstd: "17"
            sanitizer: address
          - name: linux-tsan
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            cppstd: "17"
            sanitizer: thread
          - name: linux-ubsan
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            cppstd: "17"
            sanitizer: undefined

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan 2
        uses: turtlebrowser/get-conan@main
        with:
          # 2.14.0 covers the `center2.conan.io` Conan Center v2 index —
          # the old 2.8.0 pin could not resolve recipes published there
          # (e.g. fmt/12.1.0), ERROR'ing with
          # "Package 'fmt/12.1.0' not resolved: Unable to find ... in remotes".
          version: 2.14.0
        env:
          # macos-14 ships Homebrew Python, which rejects system-wide
          # `pip install` under PEP 668 (externally-managed-environment).
          # Conan's installer still invokes pip under the hood; the
          # documented escape hatch is this env var. No-op on Linux/
          # Windows runners where pip doesn't enforce the check.
          PIP_BREAK_SYSTEM_PACKAGES: "1"

      # Split restore/save form of the Conan home cache. The combined
      # `actions/cache@v4` ties its post-step save to job success; we
      # want the save to fire even when the row fails (TSan report,
      # flaky test) so a broken row doesn't keep rebuilding boost on
      # every push. The paired `actions/cache/save@v4` at the end of
      # the job does that via `if: always()`.
      #
      # Restore runs BEFORE `conan profile detect --force`, so the
      # freshly detected profile overwrites whatever cached
      # `profiles/default` the archive carried.
      - name: Restore Conan home cache
        id: conan-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.cc }}-cpp${{ matrix.cppstd }}-${{ matrix.build_type }}-${{ matrix.sanitizer || 'none' }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ matrix.os }}-${{ matrix.cc }}-cpp${{ matrix.cppstd }}-${{ matrix.build_type }}-${{ matrix.sanitizer || 'none' }}-
            conan-${{ matrix.os }}-${{ matrix.cc }}-cpp${{ matrix.cppstd }}-${{ matrix.build_type }}-

      - name: Configure Conan default profile
        run: |
          # Force the remote URL to the v2 Conan Center endpoint so the
          # client cannot silently fall back to the legacy
          # center.conan.io (which lacks recent fmt/boost/gtest recipes).
          # `add --force` overwrites any existing entry.
          conan remote add conancenter https://center2.conan.io --force
          conan profile detect --force
          conan profile show

      - name: Install Ninja (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y ninja-build; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install ninja; fi

      - name: Visual Studio developer prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Conan install
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
          CPPSTD: ${{ matrix.cppstd }}
        run: |
          # `-o build_tests=True` pulls gtest into the dev-build; the
          # recipe defaults it OFF so `conan create` produces a lean
          # consumer package.
          conan install . \
            --output-folder=build \
            -s build_type="$BUILD_TYPE" \
            -s compiler.cppstd="$CPPSTD" \
            -o "&:build_tests=True" \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --build=missing

      - name: CMake configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          SANITIZER: ${{ matrix.sanitizer }}
          BUILD_TYPE: ${{ matrix.build_type }}
          AFUNIX: ${{ matrix.afunix }}
        run: |
          # CMAKE_CXX_STANDARD is driven by Conan's toolchain via
          # `-s compiler.cppstd=<N>` passed to the Conan install step.
          # The CMakeLists.txt respects that via its `if(NOT DEFINED
          # CMAKE_CXX_STANDARD)` guard, so no CLI override needed here.
          SAN_CXXFLAGS=""
          SAN_LDFLAGS=""
          EXTRA_CMAKE=()
          if [ -n "$SANITIZER" ]; then
            SAN_CXXFLAGS="-fsanitize=$SANITIZER -fno-omit-frame-pointer -fno-sanitize-recover=all"
            SAN_LDFLAGS="-fsanitize=$SANITIZER"
            EXTRA_CMAKE+=(-DULOG_BUILD_BENCH=OFF)
          fi
          if [ "$AFUNIX" = "ON" ]; then
            EXTRA_CMAKE+=(-DULOG_WITH_AFUNIX=ON)
          fi
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_CXX_FLAGS="$SAN_CXXFLAGS" \
            -DCMAKE_C_FLAGS="$SAN_CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$SAN_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$SAN_LDFLAGS" \
            "${EXTRA_CMAKE[@]}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        env:
          # Fail tests on the first sanitizer error instead of letting
          # them continue and mask later issues. `detect_leaks=1` is the
          # default on Linux but we spell it out for macOS parity.
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          # `suppressions=` silences TSan false positives inside the
          # moodycamel ConcurrentQueue's lock-free slot recycling. See
          # `ci/tsan.supp` for the pattern + rationale.
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:suppressions=${{ github.workspace }}/ci/tsan.supp
          # GTest prints "[ RUN      ] SuiteName.TestName" before each
          # case; force line-buffering so a crashed / hung run still
          # reveals which test was last alive.
          GTEST_COLOR: "no"
        # `--verbose` streams the ulog-tests output (the single ctest
        # target that wraps all gtest cases) so the CI log shows gtest
        # progress in real time. Combined with the CMake-level TIMEOUT,
        # a hang is interruptible and diagnosable.
        run: ctest --verbose -C ${{ matrix.build_type }}

      # Capture ctest artifacts whenever the Test step fails so the log
      # is available for post-mortem without re-running CI in debug mode.
      # `if-no-files-found: ignore` because some failures (e.g., a build
      # step earlier) leave no ctest logs on disk.
      - name: Upload ctest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.name }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
          if-no-files-found: ignore
          retention-days: 14

      # Trim Conan's build / source / download directories before the
      # cache is saved. Only `p/<hash>/p/` (the installed package) +
      # `cache.sqlite3` are needed to skip a rebuild on the next run —
      # everything else is scratch space. Without this step boost
      # alone drags ~2 GB of build-dir artifacts into the cache tarball,
      # 10-15x more than the installed binaries need.
      - name: Trim Conan cache before save
        if: always()
        run: conan cache clean "*" --build --source --download --temp --backup-sources

      # Diagnostic: dump the Conan home tree after the trim so CI logs
      # show exactly what ends up in the saved tarball. Useful when the
      # saved cache is larger than the trimmed install budget would
      # suggest.
      - name: Inspect Conan cache
        if: always()
        run: |
          echo "--- du -sh ~/.conan2 ---"
          du -sh ~/.conan2 || true
          echo "--- immediate subdirs ---"
          du -sh ~/.conan2/* 2>/dev/null || true
          echo "--- p/ subdir breakdown ---"
          du -sh ~/.conan2/p/* 2>/dev/null | sort -h | tail -20 || true
          echo "--- largest 20 files ---"
          find ~/.conan2 -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -20 || true
          echo "--- restore summary ---"
          echo "cache-hit = ${{ steps.conan-cache.outputs.cache-hit }}"
          echo "cache-primary-key = ${{ steps.conan-cache.outputs.cache-primary-key }}"
          echo "cache-matched-key = ${{ steps.conan-cache.outputs.cache-matched-key }}"

      # Save the Conan home cache regardless of whether the row
      # succeeded — a failed row still produces a valid conan cache (the
      # failure is in ulog code, not in deps) and we don't want to
      # rebuild boost on the next push. Skip on exact key hit: the
      # content on disk already matches what's on the server, re-saving
      # would only emit "another job may be creating this cache" noise.
      - name: Save Conan home cache
        if: always() && steps.conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.conan2
          key: ${{ steps.conan-cache.outputs.cache-primary-key }}

  # -----------------------------------------------------------------
  # Benchmark job — runs ulog-bench on a pinned Linux runner and
  # uploads the JSON result as an artifact. Numbers are indicative
  # (shared-runner variance), but the trend is useful for spotting
  # regressions; a future follow-up can wire `benchmark_compare` in.
  # -----------------------------------------------------------------
  bench:
    name: bench
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Conan 2
        uses: turtlebrowser/get-conan@main
        with:
          version: 2.14.0

      # Share the build job's Conan home cache — same key format, so the
      # bench job warm-starts from whatever matrix row matches. Split
      # restore/save: the paired `actions/cache/save@v4` step at the
      # end saves with `if: always()` so a failed bench run still warms
      # the cache for the next push.
      - name: Restore Conan home cache
        id: conan-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.conan2
          key: conan-ubuntu-22.04-gcc-cpp17-Release-none-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-ubuntu-22.04-gcc-cpp17-Release-none-

      - name: Configure Conan default profile
        run: |
          conan remote add conancenter https://center2.conan.io --force
          conan profile detect --force

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Conan install
        run: |
          conan install . \
            --output-folder=build \
            -s build_type=Release \
            -s compiler.cppstd=17 \
            -o "&:build_bench=True" \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --build=missing

      - name: CMake configure
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW \
            -DCMAKE_BUILD_TYPE=Release \
            -DULOG_BUILD_BENCH=ON \
            -DULOG_BUILD_TESTS=OFF \
            -DULOG_BUILD_EXAMPLES=OFF

      - name: Build benchmarks
        run: cmake --build build --parallel --target ulog-bench

      - name: Run ulog-bench
        run: |
          # Console output stays tabular (visible in the CI log); the
          # JSON snapshot at bench.json is what gets uploaded for
          # diff-across-runs tooling.
          ./build/bench/ulog-bench \
            --benchmark_out=bench.json \
            --benchmark_out_format=json \
            --benchmark_min_time=0.3s

      - name: Upload bench result
        uses: actions/upload-artifact@v4
        with:
          name: ulog-bench-${{ github.sha }}
          path: bench.json
          retention-days: 90

      # Drop build/source/download scratch before saving — same
      # rationale as the matrix job.
      - name: Trim Conan cache before save
        if: always()
        run: conan cache clean "*" --build --source --download --temp --backup-sources

      # Diagnostic — see matrix job step for rationale.
      - name: Inspect Conan cache
        if: always()
        run: |
          echo "--- du -sh ~/.conan2 ---"
          du -sh ~/.conan2 || true
          echo "--- immediate subdirs ---"
          du -sh ~/.conan2/* 2>/dev/null || true
          echo "--- p/ subdir breakdown ---"
          du -sh ~/.conan2/p/* 2>/dev/null | sort -h | tail -20 || true
          echo "--- largest 20 files ---"
          find ~/.conan2 -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -20 || true
          echo "--- restore summary ---"
          echo "cache-hit = ${{ steps.conan-cache.outputs.cache-hit }}"
          echo "cache-primary-key = ${{ steps.conan-cache.outputs.cache-primary-key }}"
          echo "cache-matched-key = ${{ steps.conan-cache.outputs.cache-matched-key }}"

      # Save under the primary key regardless of Run / Upload success.
      # Skip on exact key hit (nothing changed on disk).
      - name: Save Conan home cache
        if: always() && steps.conan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.conan2
          key: ${{ steps.conan-cache.outputs.cache-primary-key }}
